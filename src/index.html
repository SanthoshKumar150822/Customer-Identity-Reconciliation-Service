<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Identity Lookup</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;

      background: #ffd1e8;
    }

    .card {
      width: 440px;
      padding: 40px;
      text-align: center;
      border-radius: 24px;

      background: #ffd1e8;
      box-shadow:
        12px 12px 24px rgba(255, 122, 191, 0.35),
        -12px -12px 24px rgba(255, 255, 255, 0.9);

      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      margin-bottom: 28px;
      color: #000;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      border-radius: 14px;
      border: none;
      outline: none;

      background: #ffd1e8;
      box-shadow:
        inset 6px 6px 12px rgba(255, 122, 191, 0.35),
        inset -6px -6px 12px rgba(255, 255, 255, 0.9);
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: none;
      cursor: pointer;

      font-size: 16px;
      font-weight: 500;
      color: #000;

      background: #ffd1e8;
      box-shadow:
        6px 6px 14px rgba(255, 122, 191, 0.4),
        -6px -6px 14px rgba(255, 255, 255, 0.9);

      transition: all 0.25s ease;
    }

    button:hover {
      box-shadow:
        inset 4px 4px 8px rgba(255, 122, 191, 0.4),
        inset -4px -4px 8px rgba(255, 255, 255, 0.9);
    }

    table {
      width: 100%;
      margin-top: 26px;
      border-collapse: separate;
      border-spacing: 0 14px;
    }

    th, td {
      padding: 13px;
      text-align: left;
      border-radius: 14px;
      background: #ffd1e8;
      box-shadow:
        inset 4px 4px 8px rgba(255, 122, 191, 0.35),
        inset -4px -4px 8px rgba(255, 255, 255, 0.9);
    }

    th {
      width: 45%;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Check Customer Identity</h2>

    <input placeholder="Enter Email" />
    <input placeholder="Enter Phone Number" />
    <p>Enter Email or Phone Number</p>

    <button>Check</button>
  </div>

</body>
</html>
